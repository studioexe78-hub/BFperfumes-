<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF PERFUMES | الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c5a059;
            --gold-light: #d4b472;
            --gold-dim: rgba(197,160,89,0.15);
            --dark: #0b0b0b;
            --dark2: #111;
            --card: #141414;
            --border: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px;
            background: rgba(11,11,11,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(197,160,89,0.12);
            transition: background 0.3s;
        }

        .nav-logo img { height: 42px; }

        .nav-links {
            display: flex; gap: 0; list-style: none;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
        }
        .nav-links li a {
            display: block; padding: 8px 22px;
            color: #aaa; font-size: 14px; font-weight: 500;
            text-decoration: none; border-radius: 50px;
            transition: 0.25s;
        }
        .nav-links li a:hover,
        .nav-links li a.active {
            background: var(--gold);
            color: #000;
        }

        .nav-right {
            display: flex; align-items: center; gap: 16px;
        }

        /* زر السلة في النافبار */
        .cart-btn {
            position: relative;
            background: rgba(197,160,89,0.1);
            border: 1px solid var(--gold);
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none;
            transition: 0.25s;
        }
        .cart-btn:hover { background: var(--gold); }
        .cart-btn svg { width: 19px; height: 19px; fill: none; stroke: var(--gold); stroke-width: 2; transition: 0.25s; }
        .cart-btn:hover svg { stroke: #000; }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: var(--gold); color: #000;
            border-radius: 50%; width: 19px; height: 19px;
            font-size: 10px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-count.bump { animation: bump 0.3s ease; }
        @keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.6)} }

        /* hamburger للموبايل */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; }
        .hamburger span { width: 24px; height: 2px; background: var(--gold); border-radius: 2px; transition: 0.3s; }

        /* mobile menu */
        .mobile-menu {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.96);
            flex-direction: column; align-items: center; justify-content: center;
            gap: 36px;
        }
        .mobile-menu.open { display: flex; }
        .mobile-menu a {
            font-size: 26px; font-weight: 700; color: #fff;
            text-decoration: none; transition: color 0.2s;
        }
        .mobile-menu a:hover { color: var(--gold); }
        .close-menu {
            position: absolute; top: 24px; left: 24px;
            font-size: 30px; color: #888; cursor: pointer;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            padding: 100px 20px 60px;
            position: relative; overflow: hidden;
        }

        /* خلفية الـ hero */
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 60%, rgba(197,160,89,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 80% 40% at 50% 100%, rgba(197,160,89,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* دوائر ديكور */
        .hero-ring {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(197,160,89,0.08);
            pointer-events: none;
        }
        .hero-ring:nth-child(1) { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .hero-ring:nth-child(2) { width: 650px; height: 650px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        .hero-ring:nth-child(3) { width: 900px; height: 900px; top: 50%; left: 50%; transform: translate(-50%,-50%); }

        .hero-eyebrow {
            font-size: 11px; letter-spacing: 5px; color: var(--gold);
            text-transform: uppercase; margin-bottom: 20px;
            font-weight: 500;
            position: relative;
            display: inline-flex; align-items: center; gap: 12px;
        }
        .hero-eyebrow::before, .hero-eyebrow::after {
            content: ''; width: 40px; height: 1px; background: var(--gold); opacity: 0.5;
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(52px, 10vw, 110px);
            font-weight: 300; line-height: 1.0;
            letter-spacing: -1px;
            color: #fff;
            position: relative;
        }
        .hero h1 em {
            font-style: italic; color: var(--gold);
        }

        .hero-sub {
            font-size: 16px; color: #666; margin-top: 22px;
            max-width: 380px; line-height: 1.8; font-weight: 300;
            position: relative;
        }

        .hero-cta {
            margin-top: 44px; position: relative;
            display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
        }
        .btn-primary {
            background: var(--gold); color: #000;
            padding: 14px 36px; border-radius: 50px;
            font-size: 14px; font-weight: 700; font-family: 'Tajawal', sans-serif;
            text-decoration: none; border: none; cursor: pointer;
            transition: 0.25s; letter-spacing: 0.5px;
        }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
        .btn-outline {
            background: transparent; color: #fff;
            padding: 14px 36px; border-radius: 50px;
            font-size: 14px; font-weight: 500; font-family: 'Tajawal', sans-serif;
            text-decoration: none; border: 1px solid #333; cursor: pointer;
            transition: 0.25s;
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

        /* scroll indicator */
        .scroll-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #444; font-size: 11px; letter-spacing: 2px;
        }
        .scroll-dot {
            width: 1px; height: 40px;
            background: linear-gradient(to bottom, transparent, var(--gold));
        }

        /* ===== FILTER BAR ===== */
        .filter-section {
            padding: 0 40px 50px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 16px;
        }
        .filter-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px; font-weight: 300; color: #fff;
        }
        .filter-title span { color: var(--gold); font-style: italic; }

        .filter-pills {
            display: flex; gap: 8px;
        }
        .pill {
            padding: 8px 20px; border-radius: 50px;
            font-size: 13px; font-weight: 600; font-family: 'Tajawal', sans-serif;
            cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: #888;
            transition: 0.2s;
        }
        .pill:hover { border-color: var(--gold); color: var(--gold); }
        .pill.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* ===== PRODUCTS GRID ===== */
        .products-section { padding: 0 40px 80px; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* loading skeleton */
        .skeleton {
            background: var(--card);
            border-radius: 20px;
            height: 420px;
            overflow: hidden;
            position: relative;
        }
        .skeleton::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

        /* كرت المنتج */
        .product-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), border-color 0.3s, box-shadow 0.3s;
            animation: cardIn 0.5s ease both;
        }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(197,160,89,0.35);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(197,160,89,0.1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* صورة المنتج */
        .card-img-wrap {
            position: relative;
            height: 240px;
            background: #0f0f0f;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .card-img-wrap::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: linear-gradient(to top, var(--card), transparent);
        }
        .product-card img {
            width: 75%; height: 75%;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
        }
        .product-card:hover img { transform: scale(1.08) translateY(-6px); }

        /* Badge */
        .badge {
            position: absolute; top: 14px; right: 14px;
            background: rgba(197,160,89,0.15);
            border: 1px solid rgba(197,160,89,0.4);
            color: var(--gold);
            padding: 4px 12px; border-radius: 50px;
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            backdrop-filter: blur(8px);
        }

        /* معلومات الكرت */
        .card-body {
            padding: 20px;
        }
        .card-body h3 {
            font-size: 17px; font-weight: 700; color: #fff;
            margin-bottom: 6px; line-height: 1.3;
        }
        .card-price {
            font-size: 15px; color: var(--gold); font-weight: 600;
            margin-bottom: 16px;
        }

        /* زر الإضافة للسلة */
        .add-to-cart {
            width: 100%; padding: 11px;
            background: rgba(197,160,89,0.1);
            border: 1px solid rgba(197,160,89,0.3);
            color: var(--gold);
            border-radius: 10px;
            font-size: 14px; font-weight: 700; font-family: 'Tajawal', sans-serif;
            cursor: pointer; letter-spacing: 0.5px;
            transition: 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .add-to-cart:hover {
            background: var(--gold); color: #000; border-color: var(--gold);
        }
        .add-to-cart:active { transform: scale(0.97); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid rgba(197,160,89,0.4);
            color: #fff; padding: 13px 28px; border-radius: 50px;
            font-size: 14px; z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast .toast-icon { color: #4caf50; font-size: 16px; }
        .toast span { color: var(--gold); font-weight: 700; }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid var(--border);
            padding: 30px 40px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 16px;
        }
        footer img { height: 34px; opacity: 0.7; }
        footer p { font-size: 13px; color: #444; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .filter-section { padding: 0 20px 40px; }
            .products-section { padding: 0 20px 60px; }
            .hero h1 { font-size: 56px; }
            footer { padding: 24px 20px; justify-content: center; text-align: center; }
        }
        @media (max-width: 480px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
            .card-img-wrap { height: 180px; }
            .card-body { padding: 14px; }
            .card-body h3 { font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="https://i.ibb.co/j91zgNRK/IMG-183.png" alt="BF PERFUMES">
        </div>

        <ul class="nav-links">
            <li><a href="#" onclick="filterProducts('all')" class="active" id="pill-all">كل العطور</a></li>
            <li><a href="#" onclick="filterProducts('men')" id="pill-men">رجالي</a></li>
            <li><a href="#" onclick="filterProducts('women')" id="pill-women">نسائي</a></li>
        </ul>

        <div class="nav-right">
            <a href="cart.html" class="cart-btn" id="cartBtn">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke-linecap="round"/><path d="M16 10a4 4 0 01-8 0" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <div class="hamburger" onclick="document.getElementById('mobileMenu').classList.add('open')">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <span class="close-menu" onclick="document.getElementById('mobileMenu').classList.remove('open')">✕</span>
        <a href="#" onclick="filterProducts('all');document.getElementById('mobileMenu').classList.remove('open')">كل العطور</a>
        <a href="#" onclick="filterProducts('men');document.getElementById('mobileMenu').classList.remove('open')">عطورات رجالية</a>
        <a href="#" onclick="filterProducts('women');document.getElementById('mobileMenu').classList.remove('open')">عطورات نسائية</a>
        <a href="cart.html" style="color:var(--gold)">🛒 السلة</a>
    </div>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="hero-ring"></div>
        <div class="hero-ring"></div>
        <div class="hero-ring"></div>

        <div class="hero-eyebrow">عطور فاخرة</div>

        <h1>BF<br><em>PERFUMES</em></h1>

        <p class="hero-sub">اكتشف عالماً من العطور الفاخرة المختارة بعناية لتُعبّر عن شخصيتك</p>

        <div class="hero-cta">
            <a href="#products" class="btn-primary">تصفّح المجموعة</a>
            <a href="cart.html" class="btn-outline">سلة التسوق</a>
        </div>

        <div class="scroll-hint">
            <div class="scroll-dot"></div>
        </div>
    </section>

    <!-- ===== FILTER + PRODUCTS ===== -->
    <section id="products">
        <div class="filter-section">
            <div class="filter-title">مجموعة <span>العطور</span></div>
            <div class="filter-pills">
                <button class="pill active" onclick="filterProducts('all')" id="fpill-all">الكل</button>
                <button class="pill" onclick="filterProducts('men')" id="fpill-men">رجالي</button>
                <button class="pill" onclick="filterProducts('women')" id="fpill-women">نسائي</button>
            </div>
        </div>

        <div class="products-section">
            <div class="products-grid" id="productsGrid">
                <!-- skeletons -->
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <img src="https://i.ibb.co/j91zgNRK/IMG-183.png" alt="BF PERFUMES">
        <p>© 2025 BF PERFUMES — جميع الحقوق محفوظة</p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        تمت الإضافة:&nbsp;<span id="toastName"></span>
    </div>

    <!-- ===== FIREBASE + LOGIC ===== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAACMgwULMURQbbKmXkM7Nh1ZvkUQ4MR30",
            projectId: "bfperfumes",
            storageBucket: "bfperfumes.firebasestorage.app",
            messagingSenderId: "765497440872",
            appId: "1:765497440872:web:07642be56b0ba986d899dd"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let allProducts = [];

        async function init() {
            const snap = await getDocs(collection(db, "products"));
            snap.forEach(d => allProducts.push(d.data()));
            render(allProducts);
        }

        // ====== السلة ======
        function getCart() {
            try { return JSON.parse(localStorage.getItem('bf_cart')) || []; } catch { return []; }
        }
        function saveCart(cart) { localStorage.setItem('bf_cart', JSON.stringify(cart)); }

        function updateCartCount() {
            const total = getCart().reduce((s, i) => s + i.qty, 0);
            const el = document.getElementById('cartCount');
            el.textContent = total;
            el.classList.remove('bump');
            void el.offsetWidth;
            el.classList.add('bump');
        }
        function addToCart(product) {
            const cart = getCart();
            const existing = cart.find(i => i.name === product.name);
            if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
            saveCart(cart);
            updateCartCount();
            showToast(product.name);
        }
        function showToast(name) {
            const toast = document.getElementById('toast');
            document.getElementById('toastName').textContent = name;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ====== عرض المنتجات ======
        function render(list) {
            const container = document.getElementById("productsGrid");
            if (!list.length) {
                container.innerHTML = '<p style="color:#555;grid-column:1/-1;text-align:center;padding:60px 0">لا توجد منتجات</p>';
                return;
            }
            container.innerHTML = list.map((p, i) => `
                <div class="product-card" style="animation-delay:${i * 0.07}s">
                    <div class="card-img-wrap">
                        <span class="badge">${p.category === 'men' ? '♂ رجالي' : '♀ نسائي'}</span>
                        <img src="${p.imageUrl}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <div class="card-price">${p.price} ${p.currency}</div>
                        <button class="add-to-cart" onclick='window.addToCart(${JSON.stringify(p)})'>
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                            أضف للسلة
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ====== الفلتر ======
        window.filterProducts = (cat) => {
            // تحديث pills
            ['all','men','women'].forEach(c => {
                document.getElementById('fpill-' + c)?.classList.toggle('active', c === cat);
            });
            render(cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat));
            document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
        };

        window.addToCart = addToCart;
        window.onload = () => { init(); updateCartCount(); };
    </script>
</body>
</html>
