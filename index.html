<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF PERFUMES | الفخامة</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #fff; overflow-x: hidden; }

        /* القائمة واللوجو */
        .menu-btn { position: fixed; top: 25px; left: 25px; cursor: pointer; z-index: 1001; display: flex; flex-direction: column; gap: 6px; }
        .menu-btn span { width: 30px; height: 3px; background: #c5a059; transition: 0.3s; }
        .header-logo { text-align: center; padding: 20px; }
        .header-logo img { width: 120px; height: auto; }
        
        .sidebar { position: fixed; top: 0; left: -100%; width: 100%; max-width: 300px; height: 100vh; background: #121212; transition: 0.5s; padding-top: 100px; border-left: 1px solid #333; z-index: 1000; }
        .sidebar.active { left: 0; }
        .sidebar ul { list-style: none; padding: 0 40px; }
        .sidebar li { margin-bottom: 30px; }
        .sidebar a { text-decoration: none; color: #fff; font-size: 20px; transition: 0.3s; }
        .sidebar a:hover { color: #c5a059; }

        /* منطقة المنتجات */
        .content { padding: 40px 20px; text-align: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; margin-top: 50px; }
        
        .product-card { position: relative; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .product-card img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; background: #1a1a1a; }
        .badge { position: absolute; top: 10px; right: 10px; background: #c5a059; color: #000; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        .product-card h3 { color: #c5a059; margin-bottom: 10px; }
        .add-to-cart { background: #c5a059; color: #000; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')">
        <span></span><span></span><span></span>
    </div>

    <div class="header-logo">
        <img src="https://i.ibb.co/j91zgNRK/IMG-183.png" alt="BF PERFUMES">
    </div>

    <nav class="sidebar" id="sidebar">
        <ul>
            <li><a href="#" onclick="filterProducts('all')">كل العطور</a></li>
            <li><a href="#" onclick="filterProducts('men')">عطورات رجالية</a></li>
            <li><a href="#" onclick="filterProducts('women')">عطورات نسائية</a></li>
        </ul>
    </nav>

    <main class="content">
        <h1>اكتشف جوهر الفخامة</h1>
        <div class="products-grid" id="productsGrid">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAACMgwULMURQbbKmXkM7Nh1ZvkUQ4MR30",
            projectId: "bfperfumes",
            storageBucket: "bfperfumes.firebasestorage.app",
            messagingSenderId: "765497440872",
            appId: "1:765497440872:web:07642be56b0ba986d899dd"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let allProducts = [];

        async function init() {
            const snap = await getDocs(collection(db, "products"));
            snap.forEach(d => allProducts.push(d.data()));
            render(allProducts);
        }

        function render(list) {
            const container = document.getElementById("productsGrid");
            container.innerHTML = list.map(p => `
                <div class="product-card">
                    <span class="badge">${p.category === 'men' ? 'رجالي' : 'نسائي'}</span>
                    <img src="${p.imageUrl}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p style="color:#c5a059; font-weight:bold;">${p.price} ${p.currency}</p>
                    <button class="add-to-cart">إضافة للسلة</button>
                </div>
            `).join('');
        }

        window.filterProducts = (cat) => {
            document.getElementById('sidebar').classList.remove('active');
            render(cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat));
        };

        window.onload = init;
    </script>
</body>
</html>
