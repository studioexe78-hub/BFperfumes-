<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF PERFUMES | الفخامة</title>
    
    <style>
        /* إعدادات أساسية */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #fff; overflow-x: hidden; }

        /* زر القائمة (الهامبرغر) */
        .menu-btn {
            position: fixed; top: 25px; left: 25px; cursor: pointer;
            z-index: 1001; display: flex; flex-direction: column; gap: 6px;
        }
        .menu-btn span { width: 30px; height: 3px; background: #c5a059; transition: 0.3s; }

        /* اللوجو */
        .header-logo { text-align: center; padding: 20px; }
        .header-logo img { width: 120px; height: auto; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 300px;
            height: 100vh; background: #121212; transition: 0.5s ease-in-out;
            padding-top: 100px; border-left: 1px solid #333; z-index: 1000;
        }
        .sidebar.active { left: 0; }
        .sidebar ul { list-style: none; padding: 0 40px; }
        .sidebar li { margin-bottom: 30px; }
        .sidebar a { text-decoration: none; color: #fff; font-size: 20px; transition: 0.3s; }
        .sidebar a:hover { color: #c5a059; }

        /* المحتوى الرئيسي */
        .content { padding: 40px 20px; text-align: center; }
        .hero { 
            padding: 80px 20px; border: 1px solid #222; 
            border-radius: 15px; background: #111; 
        }

        /* تعديلات الموبايل */
        @media (max-width: 600px) {
            .header-logo img { width: 100px; }
            .hero { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- زر القائمة -->
    <div class="menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <!-- اللوجو -->
    <div class="header-logo">
        <img src="https://i.ibb.co/j91zgNRK/IMG-183.png" alt="BF PERFUMES">
    </div>

    <!-- القائمة الجانبية -->
    <nav class="sidebar" id="sidebar">
        <ul>
            <li><a href="#">جديدنا من العطور</a></li>
            <li><a href="#">عطورات رجالية</a></li>
            <li><a href="#">عطورات نسائية</a></li>
            <li><a href="#">التشكيلات</a></li>
            <li><a href="#">من نحن</a></li>
            <li><a href="#">تواصل معنا</a></li>
        </ul>
    </nav>

    <!-- المحتوى -->
    <main class="content">
        <section class="hero">
            <h1>عالم BF PERFUMES</h1>
            <p>اكتشف أرقى العطور الحصرية.</p>
        </section>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
        }
    </script>
</body>
</html>
